<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interview Report Atlas</title>
    <meta
      name="description"
      content="将 Interview Report 重构为 Flat Design 风格的叙事型网站，完整覆盖报告章节、推理路径与附录原文。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script src="./main.js" defer></script>
  </head>
  <body>
    <div class="page-noise" aria-hidden="true"></div>
    <div class="page-vignette" aria-hidden="true"></div>

    <div class="site-shell">
      <header class="topbar" id="top">
        <a class="library-mark" href="#top" aria-label="返回页首">
          <span class="library-mark__crest" aria-hidden="true">✶</span>
          <span class="library-mark__text">
            <strong>Interview Atlas</strong>
            <span>Flat Narrative Edition</span>
          </span>
        </a>

        <nav class="topnav" aria-label="页面导航">
          <a href="#overview">总览</a>
          <a href="#scene">场景</a>
          <a href="#product">角色</a>
          <a href="#trust">信任</a>
          <a href="#method">方法</a>
          <a href="#appendix">附录</a>
        </nav>
      </header>

      <main id="app"></main>

      <footer class="site-footer">
        <p>Built from the original report and redesigned as a flat, structured narrative interface.</p>
      </footer>
    </div>
  </body>
</html>
